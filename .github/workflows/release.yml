name: release

# Release flow (package publishing is intentionally deferred — see the note at the bottom; it will
# be added when there is something concrete to publish):
#   1. Update CHANGELOG.md (and, as hygiene, the crate version in crates/loami/Cargo.toml) on main.
#   2. Tag the commit: `git tag vX.Y.Z && git push origin vX.Y.Z`.
#   3. This workflow verifies, cuts a GitHub Release, and refreshes GitHub Pages.
#
# A manual `workflow_dispatch` run executes the verify gate only (a no-op rehearsal).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all --all-features

  github-release:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  refresh-docs:
    needs: github-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docs.yml --ref main

# DEFERRED — add a publish job here when there is something concrete to ship:
#   - crates.io:  cargo publish -p loami        (needs repo secret CARGO_REGISTRY_TOKEN)
#   - npm:        crates/loami-node (napi-rs)   (needs repo secret NPM_TOKEN)
#   - PyPI:       crates/loami-py  (PyO3/maturin)
