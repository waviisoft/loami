name: release

# Release flow:
#   1. Bump the crate version in crates/loami/Cargo.toml and update CHANGELOG.md (on main).
#   2. Tag the commit: `git tag vX.Y.Z && git push origin vX.Y.Z`.
#   3. This workflow verifies, checks the tag matches the crate version, and cuts a GitHub Release.
#
# A manual `workflow_dispatch` run executes the verify gate only.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all --all-features

  # The git tag (vX.Y.Z) must match crates/loami/Cargo.toml — the Cargo version has to keep up as
  # releases are cut. Publishing-independent, so it guards every tagged release.
  tag-version-match:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Check tag matches crate version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          ver="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "loami") | .version')"
          echo "tag=$tag  crate=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match crates/loami Cargo.toml version $ver — bump the crate version to match the tag"
            exit 1
          fi

  github-release:
    needs: [verify, tag-version-match]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

# GitHub Pages is not refreshed here: the main push that precedes the tag already redeploys the
# docs site via docs.yml.
