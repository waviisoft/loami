name: release

# Release flow:
#   1. Bump the version in crates/loami/Cargo.toml and update CHANGELOG.md (on main).
#   2. Tag the commit: `git tag vX.Y.Z && git push origin vX.Y.Z`.
#   3. This workflow verifies, publishes to crates.io, cuts a GitHub Release, and refreshes Pages.
#
# A manual `workflow_dispatch` run performs a dry-run publish (no tag, no release) for rehearsal.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Verify and dry-run publish without releasing"
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all --all-features

  publish-crate:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches crate version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          ver="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="loami") | .version')"
          echo "tag=$tag  crate=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match crate version $ver"
            exit 1
          fi

      - name: Publish to crates.io (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: cargo publish -p loami --dry-run

      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p loami

      # Future package managers (enable when the bindings exist):
      #   - npm:    crates/loami-node (napi-rs) -> `npm publish` with secrets.NPM_TOKEN
      #   - PyPI:   crates/loami-py   (PyO3/maturin) -> `maturin publish`

  github-release:
    needs: publish-crate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  refresh-docs:
    needs: github-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docs.yml --ref main
