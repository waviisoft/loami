version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    # Batch routine minor/patch bumps into one weekly PR (auto-merged once CI passes; see
    # .github/workflows/dependabot-auto-merge.yml). Major bumps still arrive as their own PRs for
    # manual review.
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
